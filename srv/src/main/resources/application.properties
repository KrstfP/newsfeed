spring.application.name=newsfeed
newsfeed.cluster.similarity-threshold=${CLUSTER_SIMILARITY_THRESHOLD:0.82}
resilience4j.ratelimiter.instances.mistral.limit-for-period=1
resilience4j.ratelimiter.instances.mistral.limit-refresh-period=1s
resilience4j.ratelimiter.instances.mistral.timeout-duration=10s
server.port=8080
spring.ai.model.chat=mistral
spring.ai.mistralai.api-key=${MISTRAL_API_KEY}
spring.ai.mistralai.chat.options.model=mistral-large-latest
spring.ai.mistralai.embedding.options.model=mistral-embed
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017}
spring.data.mongodb.database=newsfeed
